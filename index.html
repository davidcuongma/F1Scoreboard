<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Weekend Broadcaster Pro</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for running JSX in browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: #010101; 
            color: white;
            overflow: hidden;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 30px; }
        
        @keyframes rowEntry {
            from { opacity: 0; transform: translateX(-100px) skewX(-10deg); }
            to { opacity: 1; transform: translateX(0) skewX(0deg); }
        }
        .animate-row { 
            animation: rowEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }

        /* Carbon fiber texture overlay */
        .carbon-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.1;
            z-index: 0;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Stable Inline SVG Icons ---
        const Icons = {
            Users: ({size=24, className=""}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            ),
            Shield: ({size=24, className=""}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            ),
            Settings: ({size=24, className=""}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            ),
            Tv: ({size=24, className=""}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
            ),
            AlertCircle: ({size=24, className=""}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            ),
            RefreshCcw: ({size=24, className=""}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
            ),
            ExternalLink: ({size=24, className=""}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            ),
            FileSpreadsheet: ({size=24, className=""}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M8 13h2"/><path d="M14 13h2"/><path d="M8 17h2"/><path d="M14 17h2"/></svg>
            )
        };

        const TEAM_THEMES = {
            ferrari: { name: 'Ferrari', color: '#E80020' },
            mercedes: { name: 'Mercedes', color: '#27F4D2' },
            mclaren: { name: 'McLaren', color: '#FF8000' },
            redbull: { name: 'Red Bull', color: '#3671C6' },
            default: { name: 'Independent', color: '#52525b' }
        };

        const DEFAULT_SHEET_ID = '1roukKQBehdOOweJDWor5x1GlYZPIlR6WmqALTVbNG1g';
        const appId = "F1-Broadcaster-v8.9";

        function App() {
            const [appSettings, setAppSettings] = useState({
                sheetId: DEFAULT_SHEET_ID,
                rotationSpeed: 12,
                isAutoRotating: true,
                lastSync: null,
                activeView: 'drivers'
            });
            const [drivers, setDrivers] = useState([]);
            const [mode, setMode] = useState('tv');
            const [syncStatus, setSyncStatus] = useState('idle');
            const [errorMessage, setErrorMessage] = useState('');
            
            const scrollRef = useRef(null);
            const scrollInterval = useRef(null);
            const isManuallyScrolling = useRef(false);

            const fetchSheetData = async () => {
                setSyncStatus('syncing');
                setErrorMessage('');
                
                let cleanId = appSettings.sheetId.trim();
                if (cleanId.includes('/d/')) {
                    const parts = cleanId.split('/d/');
                    if (parts[1]) cleanId = parts[1].split('/')[0];
                }

                try {
                    const url = `https://docs.google.com/spreadsheets/d/${cleanId}/export?format=csv&gid=0&cachebust=${Date.now()}`;
                    const response = await fetch(url);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP Error ${response.status}: Check "Publish to web" settings.`);
                    }
                    
                    const csvText = await response.text();
                    const rows = csvText.split(/\r?\n/).filter(r => r.trim() !== '');
                    
                    const parsed = rows.slice(1).map((row, idx) => {
                        const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
                        const cleanCols = cols.map(c => c.replace(/^"|"$/g, '').trim());
                        
                        // Enhanced team mapping including "read bull" typo support
                        const rawTeam = cleanCols[1]?.toLowerCase() || '';
                        let teamKey = 'default';
                        if (rawTeam.includes('red bull') || rawTeam.includes('redbull') || rawTeam.includes('oracle') || rawTeam.includes('read bull')) teamKey = 'redbull';
                        else if (rawTeam.includes('ferrari')) teamKey = 'ferrari';
                        else if (rawTeam.includes('mercedes')) teamKey = 'mercedes';
                        else if (rawTeam.includes('mclaren')) teamKey = 'mclaren';
                        
                        // Sum Columns C, D, E, F
                        const racePoints = cleanCols.slice(2, 6).map(p => {
                            const val = parseInt(p);
                            return isNaN(val) ? 0 : val;
                        });
                        const total = racePoints.reduce((a, b) => a + b, 0);

                        return {
                            id: `driver-${idx}`,
                            name: cleanCols[0] || 'Unknown',
                            teamId: teamKey,
                            points: total
                        };
                    });

                    if (parsed.length === 0) throw new Error("No data found.");
                    
                    setDrivers(parsed);
                    setSyncStatus('idle');
                    setAppSettings(prev => ({ ...prev, lastSync: new Date().toISOString() }));
                } catch (err) {
                    console.error("Fetch Error:", err);
                    setSyncStatus('error');
                    setErrorMessage(err.message);
                }
            };

            useEffect(() => {
                fetchSheetData();
                const i = setInterval(fetchSheetData, 30000);
                return () => clearInterval(i);
            }, [appSettings.sheetId]);

            useEffect(() => {
                if (mode === 'tv' && appSettings.isAutoRotating) {
                    const i = setInterval(() => {
                        setAppSettings(prev => ({
                            ...prev,
                            activeView: prev.activeView === 'drivers' ? 'teams' : 'drivers'
                        }));
                    }, appSettings.rotationSpeed * 1000);
                    return () => clearInterval(i);
                }
            }, [mode, appSettings.isAutoRotating, appSettings.rotationSpeed]);

            useEffect(() => {
                const container = scrollRef.current;
                if (!container || mode !== 'tv') return;

                container.scrollTop = 0;

                const performScroll = () => {
                    if (isManuallyScrolling.current) return;
                    
                    if (container.scrollTop + container.clientHeight >= container.scrollHeight - 5) {
                        clearInterval(scrollInterval.current);
                        setTimeout(() => {
                            container.scrollTo({ top: 0, behavior: 'smooth' });
                            setTimeout(startScroller, 4000);
                        }, 5000);
                    } else {
                        container.scrollTop += 1;
                    }
                };

                const startScroller = () => {
                    clearInterval(scrollInterval.current);
                    scrollInterval.current = setInterval(performScroll, 35);
                };

                const startupDelay = setTimeout(startScroller, 6000);

                return () => {
                    clearInterval(scrollInterval.current);
                    clearTimeout(startupDelay);
                };
            }, [appSettings.activeView, mode]);

            const sortedDrivers = useMemo(() => [...drivers].sort((a,b) => b.points - a.points), [drivers]);
            const teamStandings = useMemo(() => {
                const ts = Object.keys(TEAM_THEMES).filter(k => k !== 'default').map(key => ({
                    id: key,
                    ...TEAM_THEMES[key],
                    points: drivers.filter(d => d.teamId === key).reduce((s, d) => s + d.points, 0)
                }));
                return ts.sort((a,b) => b.points - a.points);
            }, [drivers]);

            return (
                <div className="min-h-screen flex flex-col relative h-screen max-h-screen overflow-hidden bg-[#020202]">
                    <div className="carbon-overlay"></div>

                    <header className="relative z-50 bg-zinc-900/95 backdrop-blur-3xl border-b-2 border-red-600 px-6 py-2 flex justify-between items-center shadow-2xl">
                        <div className="flex items-center gap-6">
                            <div className="bg-red-600 px-4 py-0.5 italic font-black text-2xl rounded-sm skew-x-[-15deg] shadow-[0_0_20px_rgba(232,0,32,0.4)] transition-transform hover:scale-105 cursor-pointer">F1</div>
                            <div className="flex bg-black/60 rounded-xl p-0.5 border border-white/10">
                                <button 
                                    onClick={() => setAppSettings(p => ({ ...p, activeView: 'drivers', isAutoRotating: false }))}
                                    className={`flex items-center gap-2 px-4 py-1.5 rounded-lg font-black text-[9px] uppercase tracking-widest transition-all ${appSettings.activeView === 'drivers' ? 'bg-zinc-100 text-black shadow-xl' : 'text-zinc-500'}`}
                                >
                                    Drivers
                                </button>
                                <button 
                                    onClick={() => setAppSettings(p => ({ ...p, activeView: 'teams', isAutoRotating: false }))}
                                    className={`flex items-center gap-2 px-4 py-1.5 rounded-lg font-black text-[9px] uppercase tracking-widest transition-all ${appSettings.activeView === 'teams' ? 'bg-zinc-100 text-black shadow-xl' : 'text-zinc-500'}`}
                                >
                                    Constructors
                                </button>
                            </div>
                        </div>

                        <div className="flex gap-4 items-center">
                            {appSettings.isAutoRotating && (
                                <div className="flex items-center gap-2 bg-red-950/20 px-3 py-1 rounded-lg border border-red-900/40">
                                    <div className="w-1 h-1 bg-red-600 rounded-full animate-pulse"></div>
                                    <span className="text-[8px] font-black uppercase text-red-500 tracking-[0.2em]">Live Rotation</span>
                                </div>
                            )}
                            <button 
                                onClick={() => setMode(mode === 'tv' ? 'admin' : 'tv')}
                                className={`flex items-center gap-2 px-4 py-1.5 rounded-full font-black uppercase tracking-widest text-[8px] transition-all ${mode === 'admin' ? 'bg-red-600' : 'bg-white/5 hover:bg-white/10'}`}
                            >
                                {mode === 'tv' ? <Icons.Settings size={12} /> : <Icons.Tv size={12} />}
                                {mode === 'tv' ? 'Settings' : 'Broadcast'}
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 relative overflow-hidden z-10 flex flex-col h-full">
                        <div className={`flex-1 transition-all duration-1000 p-4 md:p-6 flex flex-col h-full overflow-hidden ${mode === 'admin' ? 'opacity-5 blur-[60px] scale-90 pointer-events-none' : 'opacity-100'}`}>
                            <div className="max-w-[2400px] mx-auto w-full flex flex-col h-full">
                                <div className="flex justify-between items-end mb-4 border-b-2 border-white/5 pb-2">
                                    <div className="animate-in slide-in-from-left duration-700">
                                        <span className="text-red-600 font-black italic uppercase tracking-[0.6em] text-sm">Season Standings</span>
                                        <h2 className="text-4xl md:text-5xl font-black italic uppercase tracking-tighter leading-none -ml-0.5 drop-shadow-2xl">
                                            {appSettings.activeView === 'drivers' ? 'Driver' : 'Constructor'}
                                        </h2>
                                    </div>
                                    <div className="text-right pb-1 animate-in slide-in-from-right duration-700">
                                        <p className="text-zinc-500 font-black uppercase tracking-[0.8em] text-[8px] mb-1 italic tracking-widest opacity-50">Melbourne 2026 Feed</p>
                                        <p className="text-3xl font-black italic text-zinc-100 tabular-nums">
                                            {appSettings.lastSync ? new Date(appSettings.lastSync).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--:--'}
                                        </p>
                                    </div>
                                </div>

                                <div 
                                    ref={scrollRef}
                                    onMouseEnter={() => isManuallyScrolling.current = true}
                                    onMouseLeave={() => isManuallyScrolling.current = false}
                                    onWheel={() => isManuallyScrolling.current = true}
                                    className="flex-1 overflow-y-auto custom-scrollbar no-scrollbar pr-2 pb-10 scroll-smooth"
                                >
                                    <div className="grid grid-cols-1 gap-3">
                                        {drivers.length > 0 ? (
                                            appSettings.activeView === 'drivers' ? 
                                                sortedDrivers.map((d, i) => <StandingsRow key={d.id} rank={i+1} name={d.name} sub={TEAM_THEMES[d.teamId]?.name} points={d.points} color={TEAM_THEMES[d.teamId]?.color} delay={i * 0.05} />)
                                                : 
                                                teamStandings.map((t, i) => <StandingsRow key={t.id} rank={i+1} name={t.name} sub="Formula 1 World Championship" points={t.points} color={t.color} delay={i * 0.05} isTeamView={true} />)
                                        ) : (
                                            <div className="flex flex-col items-center justify-center h-96 border-2 border-dashed border-zinc-900 rounded-3xl opacity-30">
                                                <Icons.FileSpreadsheet size={48} className="mb-4" />
                                                <p className="text-xl font-black italic uppercase tracking-widest text-center">Sync spreadsheet to load</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {mode === 'admin' && (
                            <div className="absolute inset-0 z-50 flex items-center justify-center p-8 bg-black/60 backdrop-blur-md animate-in zoom-in-95 duration-300">
                                <div className="bg-zinc-900 w-full max-w-2xl rounded-[2rem] border border-white/20 shadow-[0_0_100px_rgba(0,0,0,0.8)] overflow-hidden p-10 space-y-6">
                                    <h2 className="text-3xl font-black italic uppercase text-red-500">Race Control</h2>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase text-zinc-500 tracking-widest">Spreadsheet Master Link</label>
                                        <div className="flex gap-4">
                                            <input 
                                                value={appSettings.sheetId} 
                                                onChange={e => setAppSettings({...appSettings, sheetId: e.target.value})}
                                                className="flex-1 bg-black border-2 border-white/10 rounded-xl px-4 py-2 text-md font-bold focus:border-red-600 outline-none transition-all text-white"
                                                placeholder="Paste Link"
                                            />
                                            <button onClick={fetchSheetData} className="bg-white text-black px-6 rounded-xl font-black uppercase hover:bg-zinc-200 transition-colors">Sync</button>
                                        </div>
                                        {errorMessage && <p className="text-red-500 font-bold uppercase text-[9px] flex items-center gap-2"><Icons.AlertCircle size={10} /> {errorMessage}</p>}
                                    </div>
                                    <div className="flex justify-between items-center bg-black/40 p-6 rounded-xl border border-white/5">
                                        <div>
                                            <h3 className="font-black uppercase text-md">Auto Cycle</h3>
                                            <p className="text-[9px] text-zinc-500 uppercase tracking-widest">Flip views every {appSettings.rotationSpeed}s</p>
                                        </div>
                                        <input type="checkbox" checked={appSettings.isAutoRotating} onChange={e => setAppSettings({...appSettings, isAutoRotating: e.target.checked})} className="w-8 h-8 accent-red-600 cursor-pointer" />
                                    </div>
                                    <button onClick={() => setMode('tv')} className="w-full bg-red-600 py-4 rounded-xl font-black text-lg uppercase italic hover:bg-red-500 transition-colors shadow-xl">Back to Feed</button>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="p-2 bg-black border-t border-white/5 flex justify-between px-10 items-center opacity-30">
                        <div className="flex items-center gap-4">
                            <span className="text-[8px] font-black text-zinc-600 uppercase tracking-[0.8em]">Broadcaster Engine v8.9 — Minimal Broadcast Mode — {appId}</span>
                        </div>
                    </footer>
                </div>
            );
        }

        function StandingsRow({ rank, name, sub, points, color, delay, isTeamView }) {
            // Robust first name logic for drivers, full name for constructors
            const displayName = isTeamView ? name : name.split(' ')[0];

            return (
                <div 
                    className="group relative flex items-center bg-zinc-900/50 border border-white/5 py-2 px-8 animate-row opacity-0 overflow-hidden transition-all duration-1000 hover:bg-zinc-800/70 shadow-[0_5px_15px_rgba(0,0,0,0.3)]"
                    style={{ animationDelay: `${delay}s`, borderLeft: `10px solid ${color}` }}
                >
                    <div className="text-3xl md:text-4xl font-black italic text-zinc-800 mr-8 w-16 text-center tabular-nums leading-none transition-all group-hover:text-zinc-600">
                        {rank}
                    </div>
                    <div className="flex-1">
                        <h3 className="text-2xl md:text-4xl font-black italic uppercase leading-none tracking-tighter transition-all group-hover:translate-x-2 duration-700">
                            {displayName}
                        </h3>
                        <p className="text-zinc-500 font-black tracking-[0.8em] uppercase text-[9px] mt-1 opacity-40 italic transition-all group-hover:opacity-100">
                            {sub}
                        </p>
                    </div>
                    <div className="text-right flex flex-col items-end">
                        <div className="text-3xl md:text-5xl font-black italic tabular-nums leading-none tracking-tighter group-hover:text-white transition-all duration-1000">
                            {points}
                        </div>
                        <div className="text-[7px] font-black text-zinc-800 uppercase tracking-[1em] mt-1 pr-2 opacity-60">SEASON TOTAL</div>
                    </div>
                </div>
            );
        }

        function LoadingScreen() {
            return (
                <div className="min-h-screen bg-black flex flex-col items-center justify-center p-10">
                    <div className="w-32 h-32 border-[12px] border-red-600 border-t-transparent rounded-full animate-spin mb-12 shadow-[0_0_80px_rgba(232,0,32,0.4)]"></div>
                    <h2 className="text-4xl font-black italic uppercase tracking-tighter text-white animate-pulse">Race Control Linking...</h2>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
