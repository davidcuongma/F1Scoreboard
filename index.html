<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F1 Blowout Broadcaster</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        * { -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Inter', sans-serif; 
            background: #010101; 
            color: white;
            overflow: hidden;
            touch-action: pan-y; 
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar { -webkit-overflow-scrolling: touch; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 30px; }
        
        @keyframes rowEntry {
            from { opacity: 0; transform: translate3d(-40px, 0, 0) skewX(-5deg); }
            to { opacity: 1; transform: translate3d(0, 0, 0) skewX(0deg); }
        }
        
        .animate-row { 
            animation: rowEntry 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
            will-change: transform, opacity;
        }

        .carbon-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.05;
            z-index: 0;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        .important-glow {
            border: 1px solid rgba(255, 215, 0, 0.2) !important;
            background: linear-gradient(to right, rgba(255, 215, 0, 0.08), transparent) !important;
        }

        @media (max-width: 768px) {
            .mobile-title-fix { font-size: 1.5rem !important; line-height: 1.1 !important; }
            .mobile-points-fix { font-size: 2.2rem !important; }
            .important-glow { text-shadow: none !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icons = {
            Settings: ({size=24, className=""}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 1 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            ),
            RefreshCcw: ({size=24, className=""}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
            ),
            MapPin: ({size=24, className=""}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            ),
            Wifi: ({size=24, className=""}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
            ),
            AlertCircle: ({size=24, className=""}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            ),
            Trash: ({size=24, className=""}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            )
        };

        const TEAM_THEMES = {
            ferrari: { name: 'Ferrari', color: '#E80020' },
            mercedes: { name: 'Mercedes', color: '#27F4D2' },
            mclaren: { name: 'McLaren', color: '#FF8000' },
            redbull: { name: 'Red Bull', color: '#3671C6' },
            default: { name: 'Independent', color: '#52525b' }
        };

        const TABS = ['drivers', 'teams', 'timetable', 'roles', 'info'];
        const DEFAULT_LEADERBOARD_ID = '1roukKQBehdOOweJDWor5x1GlYZPIlR6WmqALTVbNG1g';
        const DEFAULT_TIMETABLE_PUB_ID = '2PACX-1vSg_R5DdIr5GaBfcLRPJumD7r4LPmsfvfvszJSHbJ7UodYOBS7Hnv7YZtuqSgSEyozvSL63NrlzGFFY';

        function App() {
            const [appSettings, setAppSettings] = useState({
                sheetId: DEFAULT_LEADERBOARD_ID,
                timetableUrl: DEFAULT_TIMETABLE_PUB_ID,
                rotationSpeed: 15,
                isAutoRotating: true,
                lastSync: null,
                activeView: 'drivers'
            });
            const [drivers, setDrivers] = useState([]);
            const [timetable, setTimetable] = useState([]);
            const [mode, setMode] = useState('tv');
            const [syncStatus, setSyncStatus] = useState('idle');
            const [errorMessage, setErrorMessage] = useState('');
            
            const scrollRef = useRef(null);
            const scrollInterval = useRef(null);
            const isManuallyScrolling = useRef(false);
            const touchStart = useRef({ x: 0, y: 0 });

            // Helper to parse CSV properly including empty cells
            const parseCSVRow = (row) => {
                const result = [];
                let start = 0;
                let inQuotes = false;
                for (let i = 0; i < row.length; i++) {
                    if (row[i] === '"') inQuotes = !inQuotes;
                    if (row[i] === ',' && !inQuotes) {
                        result.push(row.substring(start, i).trim().replace(/^"|"$/g, ''));
                        start = i + 1;
                    }
                }
                result.push(row.substring(start).trim().replace(/^"|"$/g, ''));
                return result;
            };

            const fetchSheetData = async () => {
                setSyncStatus('syncing');
                setErrorMessage('');
                try {
                    let cleanId = appSettings.sheetId.trim();
                    if (cleanId.includes('/d/')) cleanId = cleanId.split('/d/')[1].split('/')[0];
                    const lbResp = await fetch(`https://docs.google.com/spreadsheets/d/${cleanId}/export?format=csv&gid=0&cachebust=${Date.now()}`);
                    if (lbResp.ok) {
                        const csv = await lbResp.text();
                        const rows = csv.split(/\r?\n/).filter(r => r.trim() !== '');
                        const parsed = rows.slice(1).map((row, idx) => {
                            const cleanCols = parseCSVRow(row);
                            const rawTeam = cleanCols[1]?.toLowerCase() || '';
                            let teamKey = 'default';
                            if (rawTeam.includes('red bull') || rawTeam.includes('redbull') || rawTeam.includes('oracle') || rawTeam.includes('read bull')) teamKey = 'redbull';
                            else if (rawTeam.includes('ferrari')) teamKey = 'ferrari';
                            else if (rawTeam.includes('mercedes')) teamKey = 'mercedes';
                            else if (rawTeam.includes('mclaren')) teamKey = 'mclaren';
                            
                            // Sum Column D-G (indexes 3,4,5,6)
                            const racePoints = cleanCols.slice(3, 7).map(val => {
                                const p = parseInt(val);
                                return isNaN(p) ? 0 : p;
                            });
                            const totalPoints = racePoints.reduce((a, b) => a + b, 0);

                            return { 
                                id: `person-${idx}`, 
                                name: cleanCols[0] || 'Unknown', 
                                teamId: teamKey, 
                                role: cleanCols[2] || 'Driver', 
                                points: totalPoints 
                            };
                        });
                        setDrivers(parsed);
                    }

                    const ttResp = await fetch(`https://docs.google.com/spreadsheets/d/e/${appSettings.timetableUrl}/pub?output=csv&cachebust=${Date.now()}`);
                    if (ttResp.ok) {
                        const csv = await ttResp.text();
                        const rows = csv.split(/\r?\n/).filter(r => r.trim() !== '');
                        const events = [];
                        const dayMeta = [{ name: 'Saturday', date: 8 }, { name: 'Sunday', date: 9 }, { name: 'Monday', date: 10 }];
                        rows.slice(1).forEach(row => {
                            const cols = parseCSVRow(row);
                            cols.forEach((cell, dayIdx) => {
                                if (cell && cell.includes(':')) {
                                    const rawTitle = cell.split(' ').slice(1).join(' ');
                                    events.push({ day: dayMeta[dayIdx].name, dayDate: dayMeta[dayIdx].date, time: cell.split(' ')[0], title: rawTitle.replace(/^\*/, ''), isImportant: rawTitle.startsWith('*') });
                                }
                            });
                        });
                        setTimetable(events);
                    }
                    setSyncStatus('idle');
                    setAppSettings(prev => ({ ...prev, lastSync: new Date().toISOString() }));
                } catch (err) { setSyncStatus('error'); setErrorMessage(err.message); }
            };

            useEffect(() => {
                fetchSheetData();
                const i = setInterval(fetchSheetData, 30000);
                return () => clearInterval(i);
            }, [appSettings.sheetId, appSettings.timetableUrl]);

            useEffect(() => {
                if (mode === 'tv' && appSettings.isAutoRotating) {
                    const i = setInterval(() => {
                        setAppSettings(prev => {
                            const rotateTabs = ['drivers', 'teams', 'timetable'];
                            const currentIndex = rotateTabs.indexOf(prev.activeView);
                            const nextIndex = currentIndex === -1 ? 0 : (currentIndex + 1) % rotateTabs.length;
                            return { ...prev, activeView: rotateTabs[nextIndex] };
                        });
                    }, appSettings.rotationSpeed * 1000);
                    return () => clearInterval(i);
                }
            }, [mode, appSettings.isAutoRotating, appSettings.rotationSpeed, appSettings.activeView]);

            useEffect(() => {
                const container = scrollRef.current;
                if (!container || mode !== 'tv') return;
                container.scrollTop = 0;
                const performScroll = () => {
                    if (isManuallyScrolling.current) return;
                    if (container.scrollTop + container.clientHeight >= container.scrollHeight - 5) {
                        clearInterval(scrollInterval.current);
                        setTimeout(() => { container.scrollTo({ top: 0, behavior: 'smooth' }); setTimeout(startScroller, 4000); }, 5000);
                    } else { container.scrollTop += 1; }
                };
                const startScroller = () => { clearInterval(scrollInterval.current); scrollInterval.current = setInterval(performScroll, 35); };
                const startupDelay = setTimeout(startScroller, 6000);
                return () => { clearInterval(scrollInterval.current); clearTimeout(startupDelay); };
            }, [appSettings.activeView, mode]);

            const handleTouchStart = (e) => { touchStart.current = { x: e.touches[0].clientX, y: e.touches[0].clientY }; };
            const handleTouchEnd = (e) => {
                const touchEnd = { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
                const dx = touchStart.current.x - touchEnd.x;
                const dy = touchStart.current.y - touchEnd.y;
                if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) {
                    setAppSettings(prev => {
                        const currentIndex = TABS.indexOf(prev.activeView);
                        let nextIndex = dx > 0 ? (currentIndex + 1) % TABS.length : (currentIndex - 1 + TABS.length) % TABS.length;
                        return { ...prev, activeView: TABS[nextIndex], isAutoRotating: false };
                    });
                }
            };

            const sortedDrivers = useMemo(() => [...drivers].sort((a,b) => b.points - a.points), [drivers]);
            const teamStandings = useMemo(() => {
                return Object.keys(TEAM_THEMES).filter(k => k !== 'default').map(key => ({
                    id: key, ...TEAM_THEMES[key], points: drivers.filter(d => d.teamId === key).reduce((sum, d) => sum + d.points, 0)
                })).sort((a,b) => b.points - a.points);
            }, [drivers]);

            const raceStatus = useMemo(() => {
                const now = new Date();
                const d = now.getDate();
                const currentMinutes = now.getHours() * 60 + now.getMinutes();
                const timeToNum = (t) => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };
                const allEventsSorted = [...timetable].sort((a, b) => (a.dayDate - b.dayDate) || (timeToNum(a.time) - timeToNum(b.time)));
                let current = null, next = null;
                for (let i = 0; i < allEventsSorted.length; i++) {
                    const ev = allEventsSorted[i];
                    const evStart = timeToNum(ev.time);
                    const nextEv = allEventsSorted[i + 1];
                    const evEnd = nextEv && nextEv.dayDate === ev.dayDate ? timeToNum(nextEv.time) : evStart + 120;
                    if (d === ev.dayDate && currentMinutes >= evStart && currentMinutes < evEnd) { current = ev; next = nextEv || null; break; }
                    else if ((ev.dayDate > d) || (d === ev.dayDate && evStart > currentMinutes)) { next = ev; break; }
                }
                return { current, next, allEventsSorted };
            }, [timetable]);

            const filteredTimetable = useMemo(() => {
                const now = new Date();
                const d = now.getDate();
                const currentMinutes = now.getHours() * 60 + now.getMinutes();
                const timeToNum = (t) => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };
                return raceStatus.allEventsSorted.filter(ev => {
                    if (ev.dayDate > d) return true;
                    if (ev.dayDate < d) return false;
                    return (timeToNum(ev.time) + 120) > currentMinutes;
                });
            }, [raceStatus.allEventsSorted]);

            return (
                <div className="min-h-screen flex flex-col relative h-screen max-h-screen overflow-hidden bg-[#010101]" onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
                    <div className="carbon-overlay"></div>
                    <header className="relative z-50 bg-zinc-900/95 backdrop-blur-3xl border-b-2 border-red-600 px-4 md:px-6 py-2 flex flex-col gap-2 shadow-2xl">
                        <div className="flex justify-between items-center">
                            <div className="bg-red-600 px-3 md:px-4 py-0.5 italic font-black text-xl md:text-2xl rounded-sm skew-x-[-15deg] shadow-[0_0_20px_rgba(232,0,32,0.4)]">F1 BLOWOUT</div>
                            <button onClick={() => setMode(mode === 'tv' ? 'admin' : 'tv')} className="bg-white/5 p-2 rounded-full hover:bg-white/10 active:scale-90 transition-transform"><Icons.Settings size={14} /></button>
                        </div>
                        <div className="grid grid-cols-5 bg-black/60 rounded-xl p-0.5 border border-white/10 w-full overflow-hidden">
                            {TABS.map(v => (
                                <button key={v} onClick={() => setAppSettings(p => ({ ...p, activeView: v, isAutoRotating: false }))} className={`py-2 rounded-lg font-black text-[7px] md:text-[10px] uppercase transition-all text-center ${appSettings.activeView === v ? 'bg-zinc-100 text-black shadow-xl scale-105' : 'text-zinc-500 hover:text-zinc-200'}`}>
                                    {v === 'timetable' ? 'Sched' : v === 'roles' ? 'Roles' : v === 'info' ? 'Info' : v}
                                </button>
                            ))}
                        </div>
                    </header>

                    <main className="flex-1 relative overflow-hidden z-10 flex flex-col h-full">
                        <div className={`flex-1 transition-all duration-700 p-3 md:p-6 flex flex-col h-full overflow-hidden ${mode === 'admin' ? 'opacity-5 blur-[40px] scale-95 pointer-events-none' : 'opacity-100'}`}>
                            <div className="max-w-[2400px] mx-auto w-full flex flex-col h-full">
                                <div className="flex flex-col md:grid md:grid-cols-2 gap-2 md:gap-4 mb-4 md:mb-6">
                                    <div className={`p-3 md:p-4 rounded-xl border-l-[6px] md:border-l-8 transition-all ${raceStatus.current ? 'bg-red-600/20 border-red-600 animate-pulse' : 'bg-zinc-900/40 border-zinc-800 opacity-40'}`}>
                                        <span className={`text-[8px] md:text-[10px] font-black uppercase px-2 py-0.5 rounded ${raceStatus.current ? 'bg-red-600 text-white' : 'bg-zinc-700 text-zinc-400'}`}>{raceStatus.current ? 'Live Now' : 'Standby'}</span>
                                        <h4 className="text-xl md:text-3xl font-black italic uppercase tracking-tighter mt-1 truncate">{raceStatus.current ? raceStatus.current.title : 'Standby'}</h4>
                                    </div>
                                    <div className="p-3 md:p-4 rounded-xl bg-zinc-900/60 border-l-[6px] md:border-l-8 border-zinc-500">
                                        <div className="flex items-center gap-2 md:gap-3">
                                            <span className="text-[8px] md:text-[10px] font-black uppercase bg-zinc-700 text-zinc-300 px-2 py-0.5 rounded">Up Next</span>
                                            {raceStatus.next && <span className="text-[8px] md:text-[10px] font-bold text-zinc-500">{raceStatus.next.day} @ {raceStatus.next.time}</span>}
                                        </div>
                                        <h4 className="text-xl md:text-3xl font-black italic uppercase tracking-tighter mt-1 truncate opacity-80">{raceStatus.next ? raceStatus.next.title : 'Finish'}</h4>
                                    </div>
                                </div>

                                <div ref={scrollRef} onMouseEnter={() => isManuallyScrolling.current = true} onMouseLeave={() => isManuallyScrolling.current = false} onWheel={() => isManuallyScrolling.current = true} className="flex-1 overflow-y-auto custom-scrollbar pr-1 md:pr-2 pb-10 scroll-smooth">
                                    <div className="grid grid-cols-1 gap-2 md:gap-3">
                                        {appSettings.activeView === 'info' ? (
                                            <ImportantInfoLayout />
                                        ) : appSettings.activeView === 'timetable' ? (
                                            <TimetableLayout timetable={filteredTimetable} raceStatus={raceStatus} />
                                        ) : appSettings.activeView === 'roles' ? (
                                            <TeamRolesLayout drivers={drivers} />
                                        ) : drivers.length > 0 ? (
                                            appSettings.activeView === 'drivers' ? 
                                                sortedDrivers.map((d, i) => <StandingsRow key={d.id} rank={i+1} name={d.name} sub={TEAM_THEMES[d.teamId]?.name} points={d.points} color={TEAM_THEMES[d.teamId]?.color} delay={i * 0.05} />)
                                                : 
                                                teamStandings.map((t, i) => <StandingsRow key={t.id} rank={i+1} name={t.name} sub="World Championship" points={t.points} color={t.color} delay={i * 0.05} isTeamView={true} />)
                                        ) : (
                                            <div className="flex flex-col items-center justify-center h-96 opacity-30"><p className="text-sm md:text-xl font-black italic uppercase tracking-widest text-center">Sync data to load</p></div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {mode === 'admin' && (
                            <div className="absolute inset-0 z-[100] flex items-center justify-center p-4 md:p-8 bg-black/80 backdrop-blur-md animate-in zoom-in-95 duration-300">
                                <div className="bg-zinc-900 w-full max-w-2xl rounded-3xl border border-white/20 shadow-2xl p-6 md:p-10 space-y-6 overflow-y-auto max-h-[90vh]">
                                    <h2 className="text-2xl md:text-3xl font-black italic uppercase text-red-500">Race Control</h2>
                                    <div className="space-y-4">
                                        <input value={appSettings.sheetId} onChange={e => setAppSettings({...appSettings, sheetId: e.target.value})} className="w-full bg-black border-2 border-white/10 rounded-xl px-4 py-3 text-sm font-bold text-white mb-2 focus:border-red-600 outline-none" placeholder="Leaderboard ID" />
                                        <input value={appSettings.timetableUrl} onChange={e => setAppSettings({...appSettings, timetableUrl: e.target.value})} className="w-full bg-black border-2 border-white/10 rounded-xl px-4 py-3 text-sm font-bold text-white focus:border-red-600 outline-none" placeholder="Timetable Pub ID" />
                                        <button onClick={fetchSheetData} className="w-full bg-white text-black py-4 rounded-xl font-black uppercase hover:bg-zinc-200 active:scale-95 transition-all flex items-center justify-center gap-2">
                                            <Icons.RefreshCcw size={16} className={syncStatus === 'syncing' ? 'animate-spin' : ''} /> Sync All Data
                                        </button>
                                        <div className="flex justify-between items-center bg-black/40 p-4 rounded-xl"><span className="text-xs font-black uppercase italic">Rotation Engine</span><input type="checkbox" checked={appSettings.isAutoRotating} onChange={e => setAppSettings({...appSettings, isAutoRotating: e.target.checked})} className="w-8 h-8 accent-red-600" /></div>
                                    </div>
                                    <button onClick={() => setMode('tv')} className="w-full bg-red-600 py-4 rounded-xl font-black text-lg uppercase italic active:scale-95 transition-all">Enter Broadcast</button>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="p-2 bg-black border-t border-white/5 flex justify-between px-6 md:px-10 items-center opacity-30 text-[7px] md:text-[8px] font-black text-zinc-600 uppercase tracking-[0.5em] md:tracking-[0.8em]">
                        F1 BLOWOUT v10.3 — PARSER FIXED — PRO ENGINE
                    </footer>
                </div>
            );
        }

        function ImportantInfoLayout() {
            return (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-3 pb-20 animate-in fade-in duration-700">
                    <div className="bg-zinc-900/60 p-4 rounded-2xl border border-white/5 space-y-3">
                        <div className="flex items-center gap-3 border-b border-white/10 pb-2"><Icons.MapPin className="text-red-500" size={16}/><h3 className="text-sm font-black uppercase italic">Access</h3></div>
                        <div className="space-y-1 text-[10px]">
                            <p className="font-bold text-zinc-400 uppercase">Address: <span className="text-white">30 Acheron Avenue, Tootgarook</span></p>
                            <p className="font-bold text-zinc-400 uppercase">Key Safe: <span className="text-white text-lg">6290</span></p>
                            <p className="font-bold text-zinc-400 text-[8px] opacity-60">LOCATED AT PILLAR RIGHT OF FRONT DOOR</p>
                            <p className="font-bold text-zinc-400 uppercase">Times: <span className="text-red-500">IN 4PM</span> / <span className="text-zinc-500">OUT 10AM</span></p>
                        </div>
                    </div>
                    <div className="bg-zinc-900/60 p-4 rounded-2xl border border-white/5 space-y-3">
                        <div className="flex items-center gap-3 border-b border-white/10 pb-2"><Icons.Wifi className="text-blue-500" size={16}/><h3 className="text-sm font-black uppercase italic">Connectivity</h3></div>
                        <div className="space-y-1 text-[10px]">
                            <p className="font-bold text-zinc-400 uppercase">SSID: <span className="text-white">TelstraEE8347</span></p>
                            <p className="font-bold text-zinc-400 uppercase">Pass: <span className="text-white italic">z952uhjygu</span></p>
                        </div>
                    </div>
                    <div className="bg-zinc-900/60 p-4 rounded-2xl border border-white/5 space-y-3">
                        <div className="flex items-center gap-3 border-b border-white/10 pb-2"><Icons.AlertCircle className="text-yellow-500" size={16}/><h3 className="text-sm font-black uppercase italic">House Rules</h3></div>
                        <ul className="text-[9px] font-bold text-zinc-400 space-y-1 uppercase">
                            <li>• NO Noise/Deck 11PM-7AM</li>
                            <li>• NO Parties (Council Law)</li>
                            <li>• Park on Premises ONLY</li>
                            <li>• $500 Council Fine per breach</li>
                        </ul>
                    </div>
                    <div className="bg-zinc-900/60 p-4 rounded-2xl border border-white/5 space-y-3">
                        <div className="flex items-center gap-3 border-b border-white/10 pb-2"><Icons.Trash className="text-green-500" size={16}/><h3 className="text-sm font-black uppercase italic">Equipment</h3></div>
                        <div className="space-y-1 text-[9px]">
                            <p className="font-bold text-zinc-400 uppercase">Coffee: <span className="text-white italic">Aldi Pods Machine</span></p>
                            <p className="font-bold text-zinc-400 uppercase">Bins: <span className="text-white italic">Tuesday Morning Collection</span></p>
                            <p className="font-bold text-zinc-400 uppercase">Fireplace: <span className="text-white italic">Hold Top + Red Remote</span></p>
                        </div>
                    </div>
                </div>
            );
        }

        function TimetableLayout({ timetable, raceStatus }) {
            const days = ['Saturday', 'Sunday', 'Monday'];
            return (
                <div className="space-y-8 pb-20">
                    {days.map(day => {
                        const dayEvents = timetable.filter(e => e.day === day);
                        if (dayEvents.length === 0) return null;
                        return (
                            <div key={day} className="space-y-3 animate-in fade-in duration-1000">
                                <h3 className="text-lg font-black uppercase italic text-red-600 border-b border-red-900/30 pb-1">{day} Program</h3>
                                <div className="grid grid-cols-1 gap-1.5 md:gap-2">
                                    {dayEvents.map((ev, i) => {
                                        const isLive = raceStatus.current?.title === ev.title && raceStatus.current?.day === ev.day;
                                        return (
                                            <div key={i} className={`flex justify-between items-center p-3 md:p-4 rounded-xl border transition-all ${isLive ? 'bg-red-600 text-white border-red-500 shadow-xl' : ev.isImportant ? 'important-glow border-yellow-500/20' : 'bg-zinc-900/40 border-white/5 opacity-70'}`}>
                                                <div className="flex items-center gap-4 md:gap-6"><span className={`text-xl md:text-2xl font-black tabular-nums ${isLive ? 'text-white' : ev.isImportant ? 'text-yellow-500' : 'text-zinc-500'}`}>{ev.time}</span><span className={`text-lg md:text-2xl font-black uppercase tracking-tighter truncate max-w-[45vw] ${ev.isImportant ? 'text-white' : ''}`}>{ev.title}</span></div>
                                                <div className="flex gap-1.5">{ev.isImportant && <span className="text-[7px] md:text-[9px] font-black uppercase bg-yellow-500 text-black px-1.5 py-0.5 rounded shadow-lg">Major</span>}{isLive && <span className="text-[7px] md:text-[9px] font-black uppercase bg-white text-red-600 px-1.5 py-0.5 rounded shadow-lg">Live</span>}</div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        function TeamRolesLayout({ drivers }) {
            const teams = Object.keys(TEAM_THEMES).filter(k => k !== 'default');
            return (
                <div className="space-y-6 md:space-y-10 pb-20">
                    {teams.map(teamId => {
                        const members = drivers.filter(d => d.teamId === teamId);
                        if (members.length === 0) return null;
                        const themeColor = TEAM_THEMES[teamId].color;
                        return (
                            <div key={teamId} className="space-y-2 md:space-y-4">
                                <div className="border-b-2 pb-1 md:pb-2" style={{ borderColor: themeColor }}><h3 className="text-xl md:text-3xl font-black uppercase italic" style={{ color: themeColor }}>{TEAM_THEMES[teamId].name} Personnel</h3></div>
                                <div className="grid grid-cols-1 gap-1.5 md:gap-2">
                                    {members.map((m, i) => (
                                        <div key={i} className="flex justify-between items-center bg-zinc-900/60 p-3 md:p-4 rounded-xl border border-white/5" style={{ borderLeft: `6px solid ${themeColor}` }}>
                                            <div className="flex flex-col"><span className="text-lg md:text-2xl font-black uppercase tracking-tighter truncate max-w-[50vw]">{m.name}</span><span className="text-[8px] md:text-[10px] font-bold text-zinc-500 uppercase tracking-widest">{m.role}</span></div>
                                            <div className="text-right shrink-0"><span className="text-xl md:text-3xl font-black italic tabular-nums">{m.points}</span><span className="text-[7px] md:text-[8px] font-black text-zinc-700 ml-1.5 md:ml-2 uppercase">PTS</span></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        function StandingsRow({ rank, name, sub, points, color, delay, isTeamView }) {
            return (
                <div className="group relative flex items-center bg-zinc-900/50 border border-white/5 py-2 px-4 md:px-8 animate-row opacity-0 overflow-hidden transition-all hover:bg-zinc-800/70" style={{ animationDelay: `${delay}s`, borderLeft: `8px solid ${color}` }}>
                    <div className="text-2xl md:text-4xl font-black italic text-zinc-800 mr-4 md:mr-8 w-10 md:w-16 text-center tabular-nums leading-none shrink-0">{rank}</div>
                    <div className="flex-1 min-w-0"><h3 className="text-xl md:text-4xl font-black italic uppercase leading-none tracking-tighter truncate mobile-title-fix">{name}</h3><p className="text-zinc-500 font-black tracking-[0.4em] md:tracking-[0.8em] uppercase text-[7px] md:text-[9px] mt-1 opacity-40 italic truncate">{sub}</p></div>
                    <div className="text-right flex flex-col items-end shrink-0"><div className="text-3xl md:text-5xl font-black italic tabular-nums leading-none group-hover:text-white transition-all mobile-points-fix">{points}</div><div className="text-[6px] md:text-[7px] font-black text-zinc-800 uppercase tracking-[0.5em] md:tracking-[1em] mt-1 pr-1 md:pr-2 opacity-60 font-bold uppercase">POINTS</div></div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
